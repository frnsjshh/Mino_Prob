# Render Blueprint — deploy both services with one click
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ──
  - type: web
    name: taratulong-api
    runtime: node
    region: singapore
    rootDir: taratulong-api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: taratulong-web
          property: host
    plan: free

  # ── Frontend (Static Site) ──
  - type: web
    name: taratulong-web
    runtime: static
    rootDir: taratulong-web
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taratulong-api
          envVarKey: RENDER_EXTERNAL_URL
